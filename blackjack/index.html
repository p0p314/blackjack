<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/public/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
    <title>Blackjack - Accueil</title>
        <script type="module">
            window.__API_BASE_URL__ =
                import.meta.env?.VITE_API_URL || window.__API_BASE_URL__ || "";
        </script>
</head>

<body>
    <!-- Top navigation bar -->
    <nav class="navbar">
        <div class="navbar-left">
            <h1 class="title">♠ SIMPLE BLACKJACK ♠</h1>
        </div>
        <div id="authArea" class="navbar-right">
            <button id="loginBtn" class="btn btn-primary">Se connecter</button>
        </div>
    </nav>

    <!-- Notification globale -->
    <div id="globalNotification" class="global-notification"></div>

    <!-- Main container -->
    <div class="main-container">
        <div class="center-content">
            <h2 class="subtitle">Simple Blackjack</h2>
            <p class="description">Rejoignez la table et tentez votre chance</p>
            <a href="#" id="playBtn" class="btn btn-play hidden">▶ Jouer Maintenant</a>
        </div>
    </div>

    <!-- Modal de connexion/inscription -->
    <div id="popupLogin" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>

            <div class="modal-tabs">
                <button type="button" id="showLoginTab" class="modal-tab active">
                    Connexion
                </button>
                <button type="button" id="showRegisterTab" class="modal-tab">
                    Inscription
                </button>
            </div>

            <div id="messageBox" class="modal-message"></div>

            <div id="loginFormContainer" class="modal-form-container">
                <h2>Se connecter</h2>
                <form id="loginForm" class="modal-form">
                    <input type="text" id="loginPseudo" placeholder="Identifiant" required />
                    <input type="password" id="loginPassword" placeholder="Mot de passe" required />
                    <button type="submit" class="btn btn-primary">Se connecter</button>
                </form>
            </div>

            <div id="registerFormContainer" class="modal-form-container" style="display: none;">
                <h2>Créer un compte</h2>
                <form id="registerForm" class="modal-form">
                    <input type="text" id="registerPseudo" placeholder="Identifiant" required />
                    <input type="password" id="registerPassword" placeholder="Mot de passe (min. 6 caractères)"
                        required />
                    <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required />
                    <button type="submit" class="btn btn-primary">Créer le compte</button>
                </form>
            </div>
        </div>
    </div>

    <script src="./src/api/auth.js"></script>
</body>

</html>
