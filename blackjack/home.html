<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/public/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
    rel="stylesheet"
  />
  <title>Accueil</title>
</head>
<body>
  <h1>SIMPLE BLACK JACK</h1>
  <a href="./index.html" class="play">Jouer</a>

  <div id="authArea">
    <a href="#" id="loginBtn" class="connect">Se connecter</a>
  </div>

  <div id="popupLogin" class="popup">
    <div class="popup-content">
      <span class="close">&times;</span>

      <div class="tabs">
        <button type="button" id="showLoginTab" class="tab-btn active-tab">
          Connexion
        </button>
        <button type="button" id="showRegisterTab" class="tab-btn">
          Créer un compte
        </button>
      </div>

      <div id="messageBox" class="message-box"></div>

      <div id="loginFormContainer">
        <h2>Se connecter</h2>
        <form id="loginForm">
          <label for="loginPseudo">Identifiant :</label>
          <input type="text" id="loginPseudo" name="pseudo" required />

          <label for="loginPassword">Mot de passe :</label>
          <input type="password" id="loginPassword" name="password" required />

          <button type="submit">Se connecter</button>
        </form>
      </div>

      <div id="registerFormContainer" style="display: none;">
        <h2>Créer un compte</h2>
        <form id="registerForm">
          <label for="registerPseudo">Identifiant :</label>
          <input type="text" id="registerPseudo" name="pseudo" required />

          <label for="registerPassword">Mot de passe :</label>
          <input type="password" id="registerPassword" name="password" required />

          <button type="submit">Créer le compte</button>
        </form>
      </div>
    </div>
  </div>

  <script src="./public/auth.js"></script>
</body>
</html>
